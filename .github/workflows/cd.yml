name: 🚀 CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/community-hero

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build & Push Docker Images ─────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [client, server, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Railway (Staging) ────────────────────────────────────
  deploy-staging:
    name: 🌿 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-push]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy server to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service community-hero-server --detach || echo "Server deploy triggered"

      - name: Notify Slack — Staging Deployed
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Community Hero* staging deploy: ${{ job.status }}\nCommit: `${{ github.event.head_commit.message }}`\nBy: @${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─── Manual Approval Gate → Production ──────────────────────────────
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    # Manual approval configured via GitHub Environment protection rules
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: "Blue-Green: Spin up new instances"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service community-hero-server-prod --detach
          echo "New version deployed. Traffic will shift after health check."

      - name: Health check — wait for ready
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed after ${i}x attempts"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔄 Health check failed — rolling back to previous deployment"
          railway rollback --service community-hero-server-prod || true

      - name: Notify Slack — Production Result
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🚨' }} *PRODUCTION* deploy: ${{ job.status }}\nURL: ${{ vars.PRODUCTION_URL }}\nBy: @${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
