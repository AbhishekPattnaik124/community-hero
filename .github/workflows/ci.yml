name: 🔍 CI — Lint, Test & Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Client Lint ────────────────────────────────────────────────────
  client-lint:
    name: 🖥️ Client Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint || true   # warn only — don't fail build

  # ─── Server Lint & Test ─────────────────────────────────────────────
  server-lint:
    name: ⚙️ Server Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint || true

  # ─── Python ML Service ──────────────────────────────────────────────
  ml-service-check:
    name: 🐍 ML Service Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py && echo "✅ Syntax OK"

  # ─── Security Scan (Trivy) ──────────────────────────────────────────
  security-scan:
    name: 🛡️ Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          severity: CRITICAL,HIGH
          exit-code: '0'   # warn only in CI
          format: table

  # ─── Secret Scanning ────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # optional
        continue-on-error: true   # report but don't block

  # ─── Client Build Check ─────────────────────────────────────────────
  client-build:
    name: 🏗️ Client Build Check
    runs-on: ubuntu-latest
    needs: [client-lint]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL || 'http://localhost:5000/api' }}
          VITE_SOCKET_URL: ${{ secrets.STAGING_SOCKET_URL || 'http://localhost:5000' }}
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1
