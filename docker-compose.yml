version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: community_hero_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: community_hero
    volumes:
      - mongo_data:/data/db
    networks:
      - community_hero_net

  redis:
    image: redis:7.2-alpine
    container_name: community_hero_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass redissecret
    volumes:
      - redis_data:/data
    networks:
      - community_hero_net

volumes:
  mongo_data:
  redis_data:

networks:
  community_hero_net:
    driver: bridge
